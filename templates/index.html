<!DOCTYPE html>
<html>
<head>
<title>Face Attendance System</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.container{
margin-top:40px;
}

video{
border:3px solid black;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
margin:10px;
cursor:pointer;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#45a049;
}

nav a{
margin:10px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Face Recognition Attendance System</h1>

<nav>

<a href="/">Home</a>
<a href="/register_page">Register</a>
<a href="/attendance_page">Attendance</a>
<a href="/table_page">Table</a>
<a href="/percentage_page">Percentage</a>

</nav>

<div class="container">

<h2>Mark Attendance</h2>

<input id="name" placeholder="Enter Name">
<input id="roll" placeholder="Enter Roll">

<br><br>

<video id="video" width="500" height="350" autoplay></video>

<br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="markAttendance()">Mark Attendance</button>

<br><br>

<canvas id="canvas" width="500" height="350" style="display:none"></canvas>

</div>

<script>

let video=document.getElementById("video")

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})
.then(function(stream){

video.srcObject=stream

})
.catch(function(error){

alert("Camera access denied")

})

}


function markAttendance(){

let canvas=document.getElementById("canvas")
let context=canvas.getContext("2d")

context.drawImage(video,0,0,500,350)

let image=canvas.toDataURL("image/png")

let name=document.getElementById("name").value
let roll=document.getElementById("roll").value

fetch("/mark_attendance",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
roll:roll,
photo:image

})

})

.then(res=>res.json())
.then(data=>alert(data.message))

}

</script>

</body>
</html>
